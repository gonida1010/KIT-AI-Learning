services:
  # ── Backend API ──
  - type: web
    name: edu-sync-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: LLM_PROVIDER
        value: openai
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: KAKAO_REDIRECT_URI
        sync: false
    disk:
      name: edu-sync-data
      mountPath: /data
      sizeGB: 1

  # ── Frontend (Static Site) ──
  - type: web
    name: edu-sync-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://edu-sync-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
